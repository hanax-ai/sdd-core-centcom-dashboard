name: Dependency Audit

# Deliberately SEPARATE from the required gate: `npm audit` depends on network
# availability to the advisory database, which would make a required per-PR
# check unreliable. Runs on a schedule and on manual dispatch only.

on:
  schedule:
    - cron: "0 12 * * 1" # Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-audit
  cancel-in-progress: false

jobs:
  audit:
    name: npm-audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies (clean, from committed lockfile)
        run: npm ci --ignore-scripts
      - name: npm audit
        run: npm audit --audit-level=high
