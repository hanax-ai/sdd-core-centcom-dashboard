name: Dependency Review

# Advisory: reviews dependency changes on PRs that touch the manifest or lockfile.
# Requires the repository Dependency Graph to be enabled; if it is not, this
# advisory check errors without blocking merges (it is NOT a required status).

on:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/**

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Dependency review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high
